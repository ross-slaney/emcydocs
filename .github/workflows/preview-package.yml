name: Preview package

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  publish-preview:
    name: Publish PR preview package
    if: github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Set preview version
        id: preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const baseVersion = String(pkg.version).split("-")[0];
          const shortSha = process.env.GITHUB_SHA.slice(0, 12).replace(/[^0-9A-Za-z-]/g, "");
          const version = `${baseVersion}-pr.${process.env.PR_NUMBER}.${shortSha}.${process.env.GITHUB_RUN_NUMBER}.${process.env.GITHUB_RUN_ATTEMPT}`;
          pkg.version = version;
          fs.writeFileSync("package.json", `${JSON.stringify(pkg, null, 2)}\n`);
          const tag = `pr-${process.env.PR_NUMBER}`;
          const packageUrl = `https://www.npmjs.com/package/${pkg.name}/v/${version}`;
          console.log(`package_name=${pkg.name}`);
          console.log(`version=${version}`);
          console.log(`tag=${tag}`);
          console.log(`package_ref=${pkg.name}@${version}`);
          console.log(`tag_ref=${pkg.name}@${tag}`);
          console.log(`package_url=${packageUrl}`);
          NODE

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build library
        run: npm run build:lib

      - name: Publish preview package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
            NPM_TOKEN_USERCONFIG="$(mktemp)"
            printf '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}\nregistry=https://registry.npmjs.org/\n' > "$NPM_TOKEN_USERCONFIG"
            export NPM_CONFIG_USERCONFIG="$NPM_TOKEN_USERCONFIG"
            if npm publish --provenance --access public --tag "${{ steps.preview.outputs.tag }}"; then
              exit 0
            fi
            echo "::warning::Token-based npm publish failed; retrying without NODE_AUTH_TOKEN for npm trusted publishing."
            rm -f "$NPM_TOKEN_USERCONFIG"
            unset NPM_CONFIG_USERCONFIG
          fi

          unset NODE_AUTH_TOKEN
          npm publish --access public --tag "${{ steps.preview.outputs.tag }}"

      - name: Verify preview package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
            NPM_TOKEN_USERCONFIG="$(mktemp)"
            printf '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}\nregistry=https://registry.npmjs.org/\n' > "$NPM_TOKEN_USERCONFIG"
            export NPM_CONFIG_USERCONFIG="$NPM_TOKEN_USERCONFIG"
          fi

          for attempt in {1..12}; do
            if npm view "${{ steps.preview.outputs.package_ref }}" version; then
              exit 0
            fi
            echo "Preview package is not visible in npm yet; retrying ($attempt/12)."
            sleep 5
          done
          npm view "${{ steps.preview.outputs.package_ref }}" version

      - name: Comment package preview
        uses: actions/github-script@v7
        env:
          PACKAGE_NAME: ${{ steps.preview.outputs.package_name }}
          PACKAGE_REF: ${{ steps.preview.outputs.package_ref }}
          TAG_REF: ${{ steps.preview.outputs.tag_ref }}
          TAG: ${{ steps.preview.outputs.tag }}
          PACKAGE_URL: ${{ steps.preview.outputs.package_url }}
        with:
          script: |
            const marker = `<!-- mcpstack-preview-package:${process.env.PACKAGE_NAME} -->`;
            const body = [
              marker,
              "Preview package published.",
              "",
              `- Package: [${process.env.PACKAGE_REF}](${process.env.PACKAGE_URL})`,
              `- Dist tag: \`${process.env.TAG}\``,
              `- Install: \`npm i ${process.env.TAG_REF}\``,
              "",
              "To use this in an `mcpstack-saas` PR preview, paste this into `infra/preview-packages.json` in the `mcpstack-saas` PR:",
              "",
              "```json",
              JSON.stringify({ [process.env.PACKAGE_NAME]: process.env.TAG_REF }, null, 2),
              "```"
            ].join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  remove-preview-tag:
    name: Remove PR preview dist-tag
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Remove dist-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          npm dist-tag rm @mcpstack/docs "pr-${PR_NUMBER}" || true
